name: CI

# Corre los tests en cada push a main y en cada pull request.
# Los tests usan una serie sintética, así que NO necesitan el dataset real (que no se versiona).
# Prophet no se instala en CI (es pesado); sus tests se saltan con importorskip.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Tests
        run: pytest
